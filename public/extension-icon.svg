<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">AWS Quick Switch icon</title>
  <desc id="desc">A dark rounded square with a branching account tree feeding into a fast switch arrow.</desc>
  <defs>
    <linearGradient id="bg" x1="20" x2="108" y1="12" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#181b22" />
      <stop offset="1" stop-color="#090b10" />
    </linearGradient>
    <linearGradient id="accent" x1="26" x2="100" y1="34" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb454" />
      <stop offset="0.58" stop-color="#ff8f2f" />
      <stop offset="1" stop-color="#ff6b2c" />
    </linearGradient>
    <linearGradient id="glow" x1="45" x2="92" y1="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe2b8" stop-opacity="0.95" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <filter id="shadow" width="1.25" height="1.25" x="-0.125" y="-0.125" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="112" height="112" x="8" y="8" fill="url(#bg)" rx="30" />
  <rect width="111" height="111" x="8.5" y="8.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" rx="29.5" />
  <path fill="#12151c" d="M90 18c11.046 0 20 8.954 20 20v52c0 11.046-8.954 20-20 20H38c-11.046 0-20-8.954-20-20V38c0-11.046 8.954-20 20-20h52Z" opacity="0.45" />

  <g filter="url(#shadow)">
    <path
      fill="none"
      stroke="url(#accent)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="10"
      d="M40 36v56m0-28h26m0 0h24m-10-12 12 12-12 12"
    />
    <path
      fill="none"
      stroke="url(#glow)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="4"
      d="M40 36v56m0-28h26m0 0h24m-10-12 12 12-12 12"
      opacity="0.38"
    />
    <circle cx="40" cy="36" r="9" fill="#101318" stroke="#ffd39b" stroke-width="5" />
    <circle cx="40" cy="64" r="9" fill="#101318" stroke="#ffd39b" stroke-width="5" />
    <circle cx="40" cy="92" r="9" fill="#101318" stroke="#ffd39b" stroke-width="5" />
    <circle cx="92" cy="64" r="7" fill="#ffe7bf" opacity="0.28" />
  </g>
</svg>
